{% extends 'base.html' %}

{% block title %}Update Todo{% endblock %}

{% block content %}
    <h2>Update Task</h2>
    <form method="post" action="{% url 'update_todo' todo.id %}">
        {% csrf_token %}
        
        <input type="text" id="title" name="title" value="{{ todo.title }}" required>
        <textarea id="description" name="description" required>{{ todo.description }}</textarea>

        <label for="completed">
            <input type="checkbox" name="completed" {% if todo.completed %}checked{% endif %}> Completed
        </label>

        <button type="submit">Update Task</button>
    </form>
    <br>
    <a href="{% url 'todo_list' %}">Back to List</a>
{% endblock %}
